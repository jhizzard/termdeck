name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  syntax:
    name: Syntax check (Node ${{ matrix.node-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Syntax check server files
        run: |
          node --check packages/server/src/index.js
          node --check packages/server/src/session.js
          node --check packages/server/src/database.js
          node --check packages/server/src/rag.js
          node --check packages/server/src/themes.js
          node --check packages/cli/src/index.js
      - name: HTML validation (basic)
        run: |
          if [ -f packages/client/public/index.html ]; then
            head -1 packages/client/public/index.html | grep -q "<!DOCTYPE" || (echo "missing DOCTYPE"; exit 1)
            grep -c "</body>" packages/client/public/index.html | grep -q "1" || (echo "missing or duplicate </body>"; exit 1)
          fi

  lint-conventions:
    name: Lint logging conventions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check for silent catch blocks
        run: |
          # Allowed silent catches: feature detection at module load
          # Find all bare `catch {` blocks across source files.
          #
          # --exclude='*.ts' drops the bundled Rumen Deno Edge Function
          # mirrors under packages/server/src/setup/rumen/functions/**/*.ts.
          # Their source of truth is the rumen repo; editing the mirror here
          # would cause mirror drift. The [tag] logging convention is a
          # TermDeck server-JS rule, not a Deno-Edge-Function rule.
          BARE_CATCHES=$(grep -rn --exclude='*.ts' "catch\s*{" packages/server/src packages/cli/src packages/client/public/index.html 2>/dev/null | grep -v "catch (err)" | grep -v "catch {.*=.*null;.*}" || true)
          if [ -n "$BARE_CATCHES" ]; then
            # Filter out the 2 intentional module-load fallbacks
            UNEXPECTED=$(echo "$BARE_CATCHES" | grep -v "pty = null" | grep -v "Database = null" || true)
            if [ -n "$UNEXPECTED" ]; then
              echo "Unexpected silent catch blocks found:"
              echo "$UNEXPECTED"
              echo ""
              echo "All catch blocks must use console.error('[tag] context:', err)"
              echo "See docs/LESSONS_FROM_PODIUM.md for the rationale."
              exit 1
            fi
          fi
          echo "All catch blocks follow the [tag] logging convention."

      - name: Check console.error tag prefix usage
        run: |
          # Every console.error in source files must carry a [tag] somewhere in
          # its first argument. The tag may be preceded by whitespace or ANSI
          # escape codes (e.g. `  \x1b[31m[health] ...`), so we look for
          # [lowercase-tag] anywhere inside the call — not only immediately
          # after the opening quote.
          #
          # Exception (3rd grep -Ev): the ONLY untagged console.error allowed
          # is the CLI usage/help block in packages/cli/src/index.js — the
          # `Usage:` header line and its `  termdeck ...` continuation lines.
          # That is operator-facing help text, not diagnostic logging, and a
          # [tag] in copy-read help output would be wrong. Every OTHER kind of
          # operator-facing output (the better-sqlite3 rebuild command, the
          # port-in-use error/hint) is written with process.stderr.write, NOT
          # console.error, so it is correctly outside this lint's scope.
          # Net rule: every console.error IS a diagnostic log and MUST carry a
          # [tag] — an untagged console.error fails the lint unless it is the
          # CLI usage block. (The exception is a literal-prefix allowlist, not
          # a whitespace wildcard: a stray-leading-space untagged diagnostic
          # still fails.)
          #
          # --exclude='*.ts' drops the bundled Rumen Deno Edge Function
          # mirrors — same rationale as the silent-catch step above.
          BT='`'
          UNTAGGED=$(grep -rn --exclude='*.ts' "console\.error" packages/server/src packages/cli/src packages/client/public/index.html 2>/dev/null \
            | grep -Ev "console\.error\([^)]*\[[a-z][a-z0-9:_-]*\]" \
            | grep -Ev "console\.error\((['\"]${BT}?|${BT})(Usage:|  termdeck)" \
            || true)
          if [ -n "$UNTAGGED" ]; then
            echo "Untagged console.error calls found:"
            echo "$UNTAGGED"
            echo ""
            echo "All console.error must include a [tag]: [pty], [ws], [db], [rag], [config], [cli], [client], [flashback], [mnestra-bridge], etc."
            exit 1
          fi
          echo "All console.error calls use the [tag] prefix convention."

  docs-lint:
    name: Docs hygiene guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run docs linter
        run: bash scripts/lint-docs.sh

  install:
    name: Install dependencies
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: npm install
        run: npm install --no-audit --no-fund
        env:
          # node-pty needs python for build scripts on some platforms
          PYTHON: python3
      - name: Verify CLI launcher parses
        run: node packages/cli/src/index.js --help
